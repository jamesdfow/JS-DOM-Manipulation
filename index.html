<!DOCTYPE html>
<lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>JS-DOM-Manipulation</title>
  <link rel="stylesheet" href="styles.css">
</head>


<div class="liveFilterContainer">
  <h2>Live Filter/Search</h2>
  <br><br>
  <label for="searchBar">Search your city here:</label>
    <input type="search" name="searchBar" id="searchBar">
    <button type="button">Search</button>
    <br><br>
    <div class="searchResultsContainer">
      <!--search results will show up here-->
    </div>

</div>
  <button id = "jamesButton" >James Button </button>
<div class="nameFields">
        <label for="fname">First Name</label>
        <input type="text" placeholder="Enter first name" id="fname">
        <br><br>

        <label for="lname">Last Name</label>
        <input type="text" placeholder="Enter last name" id="lname">
        <button id="inputButton" class="inputButton">Submit</button>
      </div>

  <section class="todoList">
      <input type="text" name="todoInput" id="todoInput" placeholder="ex: pcik up apples">
      <button class="inputButton" id="addTodo" type="button">Add to To-Do list</button>
      <button class="inputButton" id="deleteTodo" type="button">Delete Last Item</button>
      <br><br>

      <div class="todoDisplayContainer">
      
      </div>
  </section>

      <div id="weatherDisplay">
    <h1>Weather Display</h1>
    <button id="fetchBtn">Get Weather Alerts</button>
    <div id="alertContainer">
      <!--JS Content will go here-->
    </div>
  </div>

  <div class="formContainer" id="formContainer">
    <form action="">
      <h2>is Bammer 6 a silly pacific island papi?!</h2>
      <div class="inputContainer">

          <input type="radio" id="vehicle1" name="vehicle" value="Good, you realized"> Yes, but with extra text
          
          <input type="radio" id="vehicle2" name="vehicle" value="Good"> Yes
          
          <!-- <input type="radio" id="vehicle3" name="vehicle" value="PublicTransport"> Public Transport -->
          <br>
          <br>
          <button type="button" onclick="displayRadioValue()">Submit</button>
          <br>
          <div id="result"></div>
      </div>
    </form>

  </div>

  <div class="countyLookup" id="countyLookup">
    <input type="text" name="inputCounty" id="inputCounty">
    <button id="countyButton" type="button">Search my zip code</button>
    <div id="countyDisplay">

    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
